name: Release binaries

on:
  push:
    tags: [ v* ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compiler (aarch64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Build release
      run: cargo build --release --features native-certs --target ${{ matrix.target }}

    - name: Prepare binary
      run: |
        cd target/${{ matrix.target }}/release
        mv crates-io-proxy crates-io-proxy-${{ matrix.target }}

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        files: target/${{ matrix.target }}/release/crates-io-proxy-${{ matrix.target }}
