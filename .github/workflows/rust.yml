name: Rust and container build checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --verbose
    - name: Build with features
      run: cargo build --features native-certs --verbose
    - name: Run tests
      run: cargo test --verbose
  fmt:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run cargo fmt
      run: cargo fmt -- --check
  clippy:
    name: Clippy lints
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run cargo clippy
      run: cargo clippy --tests -- --deny warnings
  pod-build:
    name: Container build test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run podman build
      run: podman build .
  release-binaries:
    name: Build release binaries (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build release
      run: cargo build --release --features native-certs
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: crates-io-proxy-x86_64-unknown-linux-gnu
        path: target/release/crates-io-proxy
